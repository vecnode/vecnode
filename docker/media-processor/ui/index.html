<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>vecnode media-processor</title>
</head>
<body>
  <main>
    <h1>vecnode media-processor</h1>
    <p>Container is running with a web UI and processing API.</p>

    <section>
      <p><strong>UI:</strong> <code>http://localhost:8085</code></p>
      <p><strong>API:</strong> <code>http://localhost:8086</code></p>
      <p><strong>Health:</strong> <code>GET /health</code></p>
      <p><strong>Process:</strong> <code>POST /process</code></p>
    </section>

    <button id="check">Check API Health</button>
    <div id="status"></div>
  </main>

  <script>
    const statusNode = document.getElementById("status");
    const button = document.getElementById("check");

    async function checkHealth() {
      statusNode.textContent = "Checking API...";
      try {
        const response = await fetch("http://localhost:8086/health");
        if (!response.ok) {
          throw new Error("HTTP " + response.status);
        }
        const data = await response.json();
        statusNode.textContent = "API is healthy at " + data.time;
      } catch (error) {
        statusNode.textContent = "API check failed: " + error.message;
      }
    }

    button.addEventListener("click", checkHealth);
    checkHealth();
  </script>
</body>
</html>
